name: Deploy tournament site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PGN_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/data/pgn/
          VITE_PGN_SOURCE_REPOSITORY: ${{ github.repository }}
          VITE_PGN_SOURCE_BRANCH: data
          VITE_PGN_SOURCE_DIRECTORY: pgn
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
